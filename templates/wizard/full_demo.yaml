  reach_csv: data_demo/reaches.csv
  observed_streamflow_csv: data_demo/observed/demo_observed_streamflow.csv
  swmm_inp: data_raw/swmm/demo.inp
  basin_boundary: data_demo/gee/demo_basin.geojson
