  id: wizard_full_demo
  description: Demo project with HydroLite, SWMM, GEE, and OpenHydroNet modules enabled.
  author: HydroLite Studio
modules:
  hydrolite: true
  swmm: true
  gee: true
  openhydronet: true
case:
